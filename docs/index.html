      html, body { background: #0d0d0d; color: #f3f3f3; margin: 0; }
      #boot-fallback {
        display: none;
        min-height: 100vh;
        padding: 2rem 1.25rem;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      #boot-fallback h1 { margin: 0 0 .75rem; font-size: 1.4rem; }

  <body>
    <div id="root"></div>
    <div id="boot-fallback" role="alert">
      <h1>Lumen n'a pas pu démarrer</h1>
      <p>Vérifie que le site est servi en HTTPS et que le dossier <strong>dist/</strong> est bien publié.<br />Recharge la page ou rouvre l'app depuis Safari.</p>
    </div>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById("root");
        var fallback = document.getElementById("boot-fallback");
        if (fallback && root && !root.childElementCount) {
          fallback.style.display = "block";
        }
      }, 8000);
    </script>
  </body>
